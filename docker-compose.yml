version: '3.8'

services:
  db:
    image: postgres:15
    container_name: scholara_postgres
    environment:
      POSTGRES_USER: scholara_user
      POSTGRES_PASSWORD: scholara_password
      POSTGRES_DB: scholara_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    container_name: scholara_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
